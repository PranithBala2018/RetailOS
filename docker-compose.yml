services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retailos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retailos}
      POSTGRES_DB: ${POSTGRES_DB:-retailos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_ENVIRONMENT: development
      API_DEBUG: "true"
      API_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-retailos}:${POSTGRES_PASSWORD:-retailos}@postgres:5432/${POSTGRES_DB:-retailos}
      API_REDIS_URL: redis://redis:6379/0
      API_JWT_SECRET_KEY: ${API_JWT_SECRET_KEY:?set API_JWT_SECRET_KEY in .env}
      API_CORS_ALLOW_ORIGINS: '["http://localhost:3000"]'
      API_LOG_JSON: "true"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
